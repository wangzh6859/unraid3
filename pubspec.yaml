name: unraid_app
description: "A modern Unraid management client for Android."
publish_to: 'none'
version: 2.1.23+65

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  dartssh2: ^2.8.2
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  dio: ^5.4.3
  provider: ^6.1.2
  shared_preferences: ^2.2.3

dev_dependencies:
  dartssh2: ^2.8.2
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
